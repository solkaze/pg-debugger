name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add Linux musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl-tools and gcc
        run: sudo apt-get install -y musl-tools gcc

      - name: Build (Linux)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Rename binary
        run: mv target/x86_64-unknown-linux-musl/release/pg-debuger pg-debugger-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg-debugger-linux-x86_64
          path: pg-debugger-linux-x86_64

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (macOS)
        run: cargo build --release

      - name: Rename binary
        run: mv target/release/pg-debuger pg-debugger-macos-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg-debugger-macos-x86_64
          path: pg-debugger-macos-x86_64

  release:
    needs: [build-linux, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: pg-debugger-linux-x86_64

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: pg-debugger-macos-x86_64

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            pg-debugger-linux-x86_64 \
            pg-debugger-macos-x86_64
